<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Store Prototype</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px;}
        button.danger { background-color: #ff4757; }
        button.secondary { background-color: #7f8fa6; margin-top: 15px; }
        
        #storeScreen { display: none; }
        .product-card { background: #eccc68; padding: 15px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .product-card:hover { transform: scale(1.05); background: #ffa502; }
        #status, #loginStatus { margin-top: 15px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box" id="loginScreen">
        <h2>Store Login</h2>
        <p>Enter your details to enter the shop.</p>
        <input type="text" id="loginName" placeholder="Your Name">
        <input type="email" id="loginEmail" placeholder="Your Email">
        <button onclick="loginUser()">Enter Store</button>
        <p id="loginStatus" style="color: #ff4757;"></p>
    </div>

    <div class="box" id="storeScreen">
        <h2 id="welcomeMessage">Your Cart</h2>
        
        <div class="product-card" id="productCard">
            <strong>Item:</strong> <input type="text" id="itemName" value="Sony 4K TV" style="width: 60%;">
            <p style="font-size: 12px; color: #333;">Hover over me 3 times!</p>
        </div>
        
        <button class="danger" onclick="triggerAbandonCart()">Simulate Cart Abandonment</button>
        <button class="secondary" onclick="switchAccount()">Switch Account (Logout)</button>
        <p id="status"></p>
    </div>

    <script>
        let currentUserEmail = "";

        // --- 1. SILENT AUTO-LOGIN CHECK ---
        window.onload = function() {
            fetch("http://localhost:8000/me", { credentials: "include" })
            .then(response => {
                if (response.ok) return response.json();
                throw new Error("Not logged in");
            })
            .then(data => {
                currentUserEmail = data.email;
                document.getElementById("loginScreen").style.display = "none";
                document.getElementById("storeScreen").style.display = "block";
                document.getElementById("welcomeMessage").innerText = "Welcome back, " + data.name + "!";
            })
            .catch(error => {
                document.getElementById("loginScreen").style.display = "block";
            });
        };

        // --- 2. LOGIN LOGIC ---
        function loginUser() {
            const name = document.getElementById("loginName").value;
            const email = document.getElementById("loginEmail").value;

            if(!name || !email) {
                document.getElementById("loginStatus").innerText = "Please enter both fields.";
                return;
            }

            fetch("http://localhost:8000/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include", // Accepts the cookie from FastAPI
                body: JSON.stringify({ name: name, email: email })
            })
            .then(response => response.json())
            .then(data => {
                currentUserEmail = email; 
                document.getElementById("loginScreen").style.display = "none";
                document.getElementById("storeScreen").style.display = "block";
                document.getElementById("welcomeMessage").innerText = data.message;
            });
        }

        // --- 3. LOGOUT LOGIC ---
        function switchAccount() {
            fetch("http://localhost:8000/logout", {
                method: "POST",
                credentials: "include" // Sends the cookie so FastAPI can delete it
            })
            .then(response => {
                if (response.ok) {
                    currentUserEmail = "";
                    document.getElementById("loginName").value = "";
                    document.getElementById("loginEmail").value = "";
                    document.getElementById("storeScreen").style.display = "none";
                    document.getElementById("loginScreen").style.display = "block";
                    document.getElementById("loginStatus").innerText = "Ready for new user.";
                    document.getElementById("loginStatus").style.color = "#2ed573";
                }
            });
        }

        // --- 4. HOVER TRACKING LOGIC ---
        let hoverCount = 0;
        let interestEmailSent = false; 
        const productCard = document.getElementById("productCard");

        productCard.addEventListener("mouseenter", () => {
            if (interestEmailSent) return;
            hoverCount++;
            if (hoverCount >= 3) triggerProductInterest();
        });

        function triggerProductInterest() {
            interestEmailSent = true; 
            const payload = { email: currentUserEmail, item: document.getElementById("itemName").value };

            fetch("http://localhost:8000/webhook/product_interest", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).then(response => showStatus("High-Intent Event Fired!", "#2ed573"));
        }

        // --- 5. ABANDONED CART LOGIC ---
        function triggerAbandonCart() {
            const payload = { email: currentUserEmail, item: document.getElementById("itemName").value };

            fetch("http://localhost:8000/webhook/cart_abandoned", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).then(response => showStatus("Abandoned Cart Fired!", "#ff4757"));
        }

        function showStatus(text, color) {
            const statusNode = document.getElementById("status");
            statusNode.innerText = text;
            statusNode.style.color = color;
            statusNode.style.display = "block";
            setTimeout(() => statusNode.style.display = "none", 3000);
        }
    </script>
</body>
</html>
